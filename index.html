<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 轮盘抽选工具</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent: #e94560;
            --text: #eee;
            --text-secondary: #94a3b8;
            --border: #2a2a4a;
            --input-bg: #0f0f23;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(233,69,96,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(78,205,196,0.06) 0%, transparent 60%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 48px;
            align-items: center;
            max-width: 960px;
            width: 100%;
        }

        /* ── Wheel Section ── */
        .wheel-section {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wheel-wrapper {
            position: relative;
            width: 440px;
            height: 440px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-top: 28px solid #ff6b6b;
            filter: drop-shadow(0 3px 6px rgba(255,107,107,0.5));
            z-index: 10;
            transition: transform 0.3s;
        }
        .spinning .pointer { animation: pointerBounce 0.15s ease-in-out infinite alternate; }
        @keyframes pointerBounce {
            from { transform: translateX(-50%) translateY(0); }
            to   { transform: translateX(-50%) translateY(3px); }
        }

        .hint {
            margin-top: 12px;
            font-size: 0.78rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }
        .hint kbd {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 7px;
            font-family: inherit;
            font-size: 0.75rem;
        }

        /* ── Controls ── */
        .controls {
            flex: 1;
            min-width: 280px;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .spin-btn {
            width: 100%;
            padding: 18px 32px;
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #e94560, #c23152);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
        }
        .spin-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.08) 50%, transparent 60%);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }
        .spin-btn:hover::after { transform: translateX(100%); }
        .spin-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(233,69,96,0.45);
        }
        .spin-btn:active:not(:disabled) { transform: translateY(-1px); }
        .spin-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            filter: grayscale(30%);
        }

        /* ── Result ── */
        .result-box {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 22px 20px;
            text-align: center;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            transition: border-color 0.4s;
        }
        .result-box.winner { border-color: #ffd700; }
        .result-label {
            font-size: 0.78rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .result-value {
            font-size: 1.9rem;
            font-weight: 800;
            color: #ffd700;
            word-break: break-all;
            transition: transform 0.3s;
        }
        .result-placeholder {
            color: var(--text-secondary);
            font-style: italic;
            font-size: 0.95rem;
        }

        /* ── Options ── */
        .options-section {
            background: var(--card);
            border-radius: 14px;
            padding: 20px;
        }
        .options-title {
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .add-option {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .add-option input {
            flex: 1;
            padding: 10px 14px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.25s;
        }
        .add-option input:focus { border-color: var(--accent); }
        .add-btn {
            padding: 10px 18px;
            background: #2d6a4f;
            color: #fff;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .add-btn:hover { background: #40916c; }
        .option-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
            max-height: 240px;
            overflow-y: auto;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            background: var(--input-bg);
            border-radius: 9px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .option-item:hover { background: #18183a; }
        .option-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 6px currentColor;
        }
        .option-text {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #e94560;
            cursor: pointer;
            font-size: 1.3rem;
            padding: 0 4px;
            line-height: 1;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .delete-btn:hover { opacity: 1; }
        .preset-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
            align-items: center;
        }
        .preset-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .preset-btn {
            padding: 5px 12px;
            font-size: 0.78rem;
            background: var(--border);
            border: 1px solid transparent;
            color: var(--text-secondary);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .preset-btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* ── Scrollbar ── */
        .option-list::-webkit-scrollbar { width: 4px; }
        .option-list::-webkit-scrollbar-track { background: transparent; }
        .option-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* ── Animations ── */
        @keyframes popIn {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.12); }
            100% { transform: scale(1); }
        }
        @keyframes confetti-fall {
            0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
            100% { opacity: 0; transform: translateY(60px) rotate(360deg); }
        }

        /* ── Responsive ── */
        @media (max-width: 820px) {
            .container {
                flex-direction: column;
                align-items: center;
                gap: 28px;
            }
            .wheel-wrapper {
                width: min(400px, 82vw);
                height: min(400px, 82vw);
            }
            .controls {
                width: 100%;
                max-width: 420px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ═══ Wheel ═══ -->
        <div class="wheel-section">
            <div class="wheel-wrapper" id="wheelWrapper">
                <canvas id="wheelCanvas"></canvas>
                <div class="pointer"></div>
            </div>
            <p class="hint">按 <kbd>空格</kbd> 或点击转盘抽选</p>
        </div>

        <!-- ═══ Controls ═══ -->
        <div class="controls">
            <button class="spin-btn" id="spinBtn">🎲 开 始 抽 选</button>

            <div class="result-box" id="resultBox">
                <span class="result-label">抽 选 结 果</span>
                <span class="result-value" id="resultDisplay">
                    <span class="result-placeholder">点击上方按钮开始</span>
                </span>
            </div>

            <div class="options-section">
                <div class="options-title">📋 选项管理</div>
                <div class="add-option">
                    <input type="text" id="optionInput" placeholder="输入新选项，回车添加…" maxlength="30">
                    <button class="add-btn" id="addBtn">＋ 添加</button>
                </div>
                <ul class="option-list" id="optionList"></ul>
                <div class="preset-row">
                    <span class="preset-label">快捷预设：</span>
                    <button class="preset-btn" data-preset="dinner">🍜 今晚吃什么</button>
                    <button class="preset-btn" data-preset="decision">✅ 做决定</button>
                    <button class="preset-btn" data-preset="names">👤 随机点名</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        // ─── DOM refs ──────────────────────────
        const canvas   = document.getElementById('wheelCanvas');
        const ctx      = canvas.getContext('2d');
        const wrapper  = document.getElementById('wheelWrapper');
        const spinBtn  = document.getElementById('spinBtn');
        const resultBox = document.getElementById('resultBox');
        const resultEl = document.getElementById('resultDisplay');
        const optInput = document.getElementById('optionInput');
        const addBtn   = document.getElementById('addBtn');
        const optList  = document.getElementById('optionList');

        // ─── State ─────────────────────────────
        let options      = ['选项 A', '选项 B', '选项 C', '选项 D', '选项 E', '选项 F'];
        let currentAngle = 0;
        let isSpinning   = false;
        let animId       = null;
        let canvasSize   = 440;

        // ─── Colors ────────────────────────────
        const COLORS = [
            '#FF6B6B','#4ECDC4','#45B7D1','#96CEB4',
            '#FFE66D','#DDA0DD','#F7DC6F','#82E0AA',
            '#BB8FCE','#85C1E9','#F8C471','#F1948A',
            '#73C6B6','#AED6F1','#D7BDE2','#A3E4D7',
            '#FAD7A0','#ABEBC6','#C39BD3','#7FB3D8'
        ];

        // ─── Presets ───────────────────────────
        const PRESETS = {
            dinner:   ['火锅','烧烤','日料','披萨','麻辣烫','汉堡','拉面','炒菜','饺子','炸鸡'],
            decision: ['放手去做！','再考虑考虑','问问朋友','明天再说','换条思路','相信直觉'],
            names:    ['张三','李四','王五','赵六','陈七','周八','吴九','郑十','孙十一','钱十二'],
        };

        // ─── Canvas sizing ─────────────────────
        function setupCanvas() {
            const rect = wrapper.getBoundingClientRect();
            const size = rect.width;
            const dpr  = window.devicePixelRatio || 1;
            canvas.width  = size * dpr;
            canvas.height = size * dpr;
            canvas.style.width  = size + 'px';
            canvas.style.height = size + 'px';
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
            canvasSize = size;
            return size;
        }

        // ─── Draw ──────────────────────────────
        function drawWheel(size) {
            const cx = size / 2;
            const cy = size / 2;
            const radius = size / 2 - 14;
            const n = options.length;
            if (n === 0) return;

            const segAngle = (2 * Math.PI) / n;

            ctx.clearRect(0, 0, size, size);

            // outer glow
            const glow = ctx.createRadialGradient(cx, cy, radius - 6, cx, cy, radius + 6);
            glow.addColorStop(0, 'transparent');
            glow.addColorStop(1, 'rgba(233,69,96,0.12)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(cx, cy, radius + 6, 0, 2 * Math.PI);
            ctx.fill();

            // shadow
            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy + 5, radius, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            ctx.fill();
            ctx.restore();

            // --- segments ---
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(currentAngle);

            for (let i = 0; i < n; i++) {
                const start = i * segAngle - Math.PI / 2;
                const end   = (i + 1) * segAngle - Math.PI / 2;

                // segment
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius, start, end);
                ctx.closePath();

                const color = COLORS[i % COLORS.length];

                // subtle gradient on segment
                const mid = start + segAngle / 2;
                const gx  = Math.cos(mid) * radius * 0.5;
                const gy  = Math.sin(mid) * radius * 0.5;
                const grad = ctx.createRadialGradient(gx, gy, radius * 0.05, 0, 0, radius);
                grad.addColorStop(0, lighten(color, 20));
                grad.addColorStop(1, color);
                ctx.fillStyle = grad;
                ctx.fill();

                ctx.strokeStyle = 'rgba(255,255,255,0.12)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // label
                const midAngle     = start + segAngle / 2;
                const labelRadius  = radius * 0.64;
                const lx = Math.cos(midAngle) * labelRadius;
                const ly = Math.sin(midAngle) * labelRadius;

                ctx.save();
                ctx.translate(lx, ly);
                ctx.rotate(midAngle + Math.PI / 2);

                const fontSize = Math.max(10, Math.min(15, 280 / n));
                ctx.font = `bold ${fontSize}px "PingFang SC","Microsoft YaHei",sans-serif`;
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                let label = options[i];
                const maxW = radius * 0.52;
                if (ctx.measureText(label).width > maxW) {
                    while (label.length > 1 && ctx.measureText(label + '…').width > maxW) {
                        label = label.slice(0, -1);
                    }
                    label += '…';
                }

                ctx.shadowColor = 'rgba(0,0,0,0.55)';
                ctx.shadowBlur  = 3;
                ctx.fillText(label, 0, 0);
                ctx.shadowBlur  = 0;

                ctx.restore();
            }

            // outer ring
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = 'rgba(255,255,255,0.25)';
            ctx.lineWidth = 3;
            ctx.stroke();

            // tick marks
            for (let i = 0; i < n; i++) {
                const a = i * segAngle - Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(Math.cos(a) * (radius - 7), Math.sin(a) * (radius - 7));
                ctx.lineTo(Math.cos(a) * radius, Math.sin(a) * radius);
                ctx.strokeStyle = 'rgba(255,255,255,0.35)';
                ctx.lineWidth = 1.2;
                ctx.stroke();
            }

            ctx.restore(); // un-rotate

            // --- center hub ---
            const hubR = radius * 0.11;
            const hubGrad = ctx.createRadialGradient(cx, cy - hubR * 0.25, hubR * 0.08, cx, cy, hubR);
            hubGrad.addColorStop(0, '#ffffff');
            hubGrad.addColorStop(0.5, '#e2e2e2');
            hubGrad.addColorStop(1, '#aaaaaa');
            ctx.beginPath();
            ctx.arc(cx, cy, hubR, 0, 2 * Math.PI);
            ctx.fillStyle = hubGrad;
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // tiny inner dot
            ctx.beginPath();
            ctx.arc(cx, cy, hubR * 0.25, 0, 2 * Math.PI);
            ctx.fillStyle = '#555';
            ctx.fill();
        }

        function lighten(hex, percent) {
            const num = parseInt(hex.replace('#',''), 16);
            const r = Math.min(255, (num >> 16) + percent);
            const g = Math.min(255, ((num >> 8) & 0x00FF) + percent);
            const b = Math.min(255, (num & 0x0000FF) + percent);
            return '#' + (0x1000000 + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        function render() {
            const size = setupCanvas();
            drawWheel(size);
        }

        // ─── Spin logic ────────────────────────
        function getSegmentAtPointer() {
            const n = options.length;
            if (n === 0) return -1;
            const segAngle = (2 * Math.PI) / n;
            // Pointer at -PI/2 (12 o'clock). Rotation currentAngle shifts segments clockwise.
            // Segment 0 in drawing coords starts at -PI/2.
            // After rotation: segment i screen range = [-PI/2 + i*segAngle + currentAngle, -PI/2 + (i+1)*segAngle + currentAngle)
            // Pointer in segment i when: i*segAngle + currentAngle <= 0 < (i+1)*segAngle + currentAngle  (mod 2π)
            // i = floor((-currentAngle mod 2π) / segAngle)
            let norm = ((-currentAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
            return Math.floor((norm + 0.00001) / segAngle) % n;
        }

        function spin() {
            if (isSpinning || options.length < 2) return;

            isSpinning = true;
            spinBtn.disabled = true;
            spinBtn.textContent = '🌀 抽 选 中 …';
            resultBox.classList.remove('winner');
            resultEl.innerHTML = '<span style="color:#ffd700;font-size:1.1rem;">转动中…</span>';
            wrapper.classList.add('spinning');

            const n = options.length;
            const segAngle  = (2 * Math.PI) / n;
            const winnerIdx = Math.floor(Math.random() * n);

            // Target angle: -(winnerIdx + 0.5) * segAngle  (mod 2π) + full spins
            let delta = (-(winnerIdx + 0.5) * segAngle - currentAngle) % (2 * Math.PI);
            if (delta < 0) delta += 2 * Math.PI;

            const fullSpins   = (Math.floor(Math.random() * 4) + 6) * 2 * Math.PI; // 6-9 rotations
            const targetAngle = currentAngle + fullSpins + delta;
            const startAngle  = currentAngle;
            const totalRot    = targetAngle - startAngle;
            const duration    = 4200 + Math.random() * 1800; // 4.2–6.0 s

            const startTime = performance.now();

            function animate(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);

                // ease-out (quintic) for realistic deceleration
                const eased = 1 - Math.pow(1 - progress, 5);
                currentAngle = startAngle + totalRot * eased;
                render();

                if (progress < 1) {
                    animId = requestAnimationFrame(animate);
                } else {
                    // done
                    currentAngle = targetAngle;
                    render();
                    isSpinning = false;
                    spinBtn.disabled = false;
                    spinBtn.textContent = '🎲 开 始 抽 选';
                    wrapper.classList.remove('spinning');

                    const winner = options[winnerIdx];
                    resultEl.innerHTML = `🏆 ${escapeHtml(winner)}`;
                    resultEl.style.animation = 'none';
                    void resultEl.offsetWidth;
                    resultEl.style.animation = 'popIn 0.5s ease';
                    resultBox.classList.add('winner');

                    spawnConfetti();
                }
            }

            animId = requestAnimationFrame(animate);
        }

        // ─── Confetti ───────────────────────────
        function spawnConfetti() {
            const colors = ['#ff6b6b','#ffd700','#4ecdc4','#ff9ff3','#54a0ff','#5f27cd','#01a3a4','#f368e0'];
            const container = document.body;
            for (let i = 0; i < 40; i++) {
                const dot = document.createElement('span');
                dot.textContent = ['✦','●','◆','★','♦','🎉'][Math.floor(Math.random() * 6)];
                dot.style.cssText = `
                    position: fixed;
                    pointer-events: none;
                    z-index: 9999;
                    left: ${20 + Math.random() * 60}%;
                    top: ${10 + Math.random() * 30}%;
                    font-size: ${10 + Math.random() * 20}px;
                    color: ${colors[Math.floor(Math.random() * colors.length)]};
                    animation: confetti-fall ${0.8 + Math.random() * 1.2}s ease-out forwards;
                    animation-delay: ${Math.random() * 0.3}s;
                `;
                container.appendChild(dot);
                setTimeout(() => dot.remove(), 2000);
            }
        }

        // ─── Options CRUD ───────────────────────
        function addOption(text) {
            const t = text.trim();
            if (!t) return;
            if (options.includes(t)) {
                optInput.style.borderColor = '#e94560';
                optInput.style.animation = 'none';
                void optInput.offsetWidth;
                optInput.style.animation = 'popIn 0.35s ease';
                setTimeout(() => { optInput.style.borderColor = ''; }, 1500);
                return;
            }
            options.push(t);
            optInput.value = '';
            refreshOptions();
            render();
            updateBtn();
        }

        function removeOption(idx) {
            if (options.length <= 2) {
                shakeElement(optList);
                return;
            }
            options.splice(idx, 1);
            refreshOptions();
            render();
            updateBtn();
            // reset result
            resultEl.innerHTML = '<span class="result-placeholder">点击上方按钮开始</span>';
            resultBox.classList.remove('winner');
        }

        function refreshOptions() {
            optList.innerHTML = '';
            options.forEach((opt, i) => {
                const li = document.createElement('li');
                li.className = 'option-item';
                li.innerHTML = `
                    <span class="option-color" style="background:${COLORS[i % COLORS.length]};color:${COLORS[i % COLORS.length]};"></span>
                    <span class="option-text" title="${escapeHtml(opt)}">${escapeHtml(opt)}</span>
                    <button class="delete-btn" data-idx="${i}" title="删除">×</button>
                `;
                optList.appendChild(li);
            });
            optList.querySelectorAll('.delete-btn').forEach(b => {
                b.addEventListener('click', () => removeOption(parseInt(b.dataset.idx)));
            });
        }

        function updateBtn() {
            spinBtn.disabled = options.length < 2;
        }

        function loadPreset(name) {
            if (!PRESETS[name]) return;
            options = [...PRESETS[name]];
            currentAngle = 0;
            refreshOptions();
            updateBtn();
            render();
            resultEl.innerHTML = '<span class="result-placeholder">已加载预设，点击抽选</span>';
            resultBox.classList.remove('winner');
        }

        function escapeHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function shakeElement(el) {
            el.style.animation = 'none';
            void el.offsetWidth;
            el.style.animation = 'popIn 0.3s ease';
        }

        // ─── Events ─────────────────────────────
        spinBtn.addEventListener('click', spin);

        canvas.addEventListener('click', () => {
            if (!isSpinning && options.length >= 2) spin();
        });

        addBtn.addEventListener('click', () => addOption(optInput.value));

        optInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') addOption(optInput.value);
        });

        document.querySelectorAll('.preset-btn').forEach(b => {
            b.addEventListener('click', () => loadPreset(b.dataset.preset));
        });

        document.addEventListener('keydown', e => {
            if (e.code === 'Space' && !isSpinning && document.activeElement !== optInput) {
                e.preventDefault();
                spin();
            }
        });

        let resizeT;
        window.addEventListener('resize', () => {
            clearTimeout(resizeT);
            resizeT = setTimeout(render, 150);
        });

        // ─── Init ───────────────────────────────
        refreshOptions();
        updateBtn();
        requestAnimationFrame(() => render());

        console.log('%c🎯 轮盘抽选工具已就绪 %c| %c空格键 %c或点击转盘抽选',
            'font-size:1.1em','','background:#333;color:#fff;padding:2px 6px;border-radius:3px;','');
    })();
    </script>
</body>
</html>
